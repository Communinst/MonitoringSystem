apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dns-monitor
  namespace: kube-system
  labels:
    app: dns-monitor
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dns-monitor
  template:
    metadata:
      labels:
        app: dns-monitor
    spec:
      # КРИТИЧНО 1: Позволяет поду видеть физические интерфейсы хоста (узла)
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ebpfdns
        image: privatej0ker/dns-monitor:latest
        imagePullPolicy: Always
        # env:
        # - name: "HookIfaceName"
        #   value: "enp0s3" # Передаем имя интерфейса в Go-код
        securityContext:
          capabilities:
            add:
              - BPF             # Для загрузки eBPF
              - PERFMON         # Для чтения трейспоинтов
              - NET_ADMIN       # Для XDP / TC
              - SYS_RESOURCE    # Для управления памятью (memlock) для bpf мап
        envFrom:
        - configMapRef:
            name: dns-monitor-cfg
        - configMapRef:
            name: dns-monitor-cfg-hook